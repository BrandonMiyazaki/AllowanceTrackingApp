# Deploy Application Code
# Builds and deploys the Node.js backend and Blazor frontend to Azure App Service.
# Uses OIDC federated credentials — no long-lived secrets.

name: Deploy Application

on:
  push:
    branches: [main]
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which app to deploy'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - backend
          - frontend

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: rg-allowanceapp-dev

jobs:
  build-and-deploy-backend:
    if: >-
      github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'both' || github.event.inputs.target == 'backend')
      || github.event_name == 'push'
    name: 'Build & Deploy Backend (Node.js)'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-api-allowanceapp-dev
          package: src/backend

  build-and-deploy-frontend:
    if: >-
      github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'both' || github.event.inputs.target == 'frontend')
      || github.event_name == 'push'
    name: 'Build & Deploy Frontend (Blazor)'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish --configuration Release --no-build --output ./publish

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-web-allowanceapp-dev
          package: src/frontend/publish
